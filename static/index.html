<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по партномеру</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Open Sans', sans-serif !important;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0;
      background: #f6f8fa;
      overflow-x: hidden;
    }
    .container {
      width: 100vw;
      max-width: none;
      margin: 0;
      padding: 24px 2vw 24px 2vw;
      background: #fff;
      border-radius: 0;
      box-shadow: none;
    }
    .table-wrapper {
      width: auto;
      min-width: 0;
      max-width: 100vw;
      overflow-x: auto;
      margin-top: 16px;
      border-radius: 0;
      box-shadow: none;
      background: #fff;
      position: relative;
      padding-left: 0;
    }
    h2 {
      margin-top: 0;
      font-weight: 600;
      color: #222;
      letter-spacing: 0.5px;
    }
    label {
      font-size: 1.08em;
      color: #333;
      font-weight: 500;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      font-size: 1.08em;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      margin-top: 6px;
      margin-bottom: 10px;
      resize: none;
      background: #f9f9f9;
      transition: border 0.2s;
    }
    textarea:focus {
      border: 1.5px solid #4f8cff;
      outline: none;
      background: #fff;
    }
    /* Стили для выравнивания полей ввода */
    #bulk-search-form .flex-container {
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    #bulk-search-form .flex-container > div {
      display: flex;
      flex-direction: column;
    }
    #bulk-search-form .flex-container > div:first-child {
      flex: 1;
    }
    #bulk-search-form .flex-container > div:last-child {
      flex: 0.4;
      max-width: 200px;
    }
    #bulk-search-form label {
      margin-bottom: 6px;
      line-height: 1.2;
      white-space: normal;
      word-wrap: break-word;
      min-height: 2.4em;
      display: flex;
      align-items: flex-start;
    }
    #bulk-search-form textarea {
      margin-top: 0;
      margin-bottom: 0;
      flex: 1;
    }
    /* Дополнительные стили для точного выравнивания */
    #bulk-search-form .flex-container > div:last-child {
      margin-top: 0; /* Опускаем правое поле на уровень левого */
    }
    #bulk-search-form .flex-container > div:last-child label {
      margin-top: 0;
    }
    #bulk-search-form .flex-container > div:last-child textarea {
      margin-top: 0;
    }
    
    /* Стили для правого поля поиска по наименованию */
    #name-search-input {
      margin-top: 0;
    }
    input[type="text"] {
      font-size: 1.08em;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      margin-right: 8px;
      margin-bottom: 10px;
      background: #f9f9f9;
      transition: border 0.2s;
    }
    input[type="text"]:focus {
      border: 1.5px solid #4f8cff;
      outline: none;
      background: #fff;
    }
    button {
      font-size: 1.08em;
      padding: 8px 22px;
      border-radius: 8px;
      border: none;
      background: #4f8cff;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(79,140,255,0.08);
      transition: background 0.18s, box-shadow 0.18s;
    }
    button:hover {
      background: #2563eb;
      box-shadow: 0 4px 16px rgba(79,140,255,0.13);
    }
    .btn-copy {
      padding: 2px 10px;
      font-size: 1em;
      line-height: 1.1;
      border-radius: 7px;
      background: #e0e7ff;
      color: #6366f1;
      border: none;
      box-shadow: 0 1px 4px rgba(80,120,255,0.07);
      transition: background 0.15s, color 0.15s;
    }
    .btn-copy:hover {
      background: #6366f1;
      color: #fff;
    }
    #update-info, #supplier-updates {
      color: #555;
      margin-bottom: 10px;
      font-size: 0.98em;
    }
    table {
      border-collapse: collapse;
      width: auto;
      min-width: 0;
      table-layout: auto;
      background: #fff;
      border-radius: 0;
      overflow: hidden;
      font-size: 0.97em;
      box-shadow: none;
      position: relative;
    }
    

    th, td {
      border: 1px solid #e5e7eb;
      padding: 3px 4px;
      text-align: left;
      font-size: 0.97em;
      white-space: pre-line;
      word-break: break-word;
      max-width: 120px;
      max-height: 60px;
      overflow: hidden;
    }
    /* Одинаковая высота для всех строк */
    tr td {
      max-height: 40px !important;
      overflow: hidden !important;
    }

    th:nth-child(1), td:nth-child(1) { width: 400px !important; min-width: 400px !important; max-width: 400px !important; } /* Наименование - 6.6 см */
    /* Исключение для столбца чекбоксов */
    th:nth-child(1).checkbox-column, td:nth-child(1).checkbox-column { width: 18px !important; min-width: 18px !important; max-width: 18px !important; }
    th:nth-child(2), td:nth-child(2) { width: 118px !important; min-width: 118px !important; max-width: 118px !important; } /* Бренд - 2.4 см */
    th:nth-child(3), td:nth-child(3) { width: 173px !important; min-width: 173px !important; max-width: 173px !important; } /* Партномер - 3 см */
    th:nth-child(4), td:nth-child(4) { width: 159px !important; min-width: 159px !important; max-width: 159px !important; } /* Цена (USD, ЦБ) - 2 см */
    th:nth-child(5), td:nth-child(5) { width: 180px !important; min-width: 180px !important; max-width: 225px !important; } /* Наличие (шт) - 1.5 см */
    th:nth-child(6), td:nth-child(6) { width: 151px !important; min-width: 151px !important; max-width: 151px !important; } /* Дистр - 2.5 см */
    th:nth-child(7), td:nth-child(7) { width: 159px !important; min-width: 159px !important; max-width: 159px !important; } /* Треб кол - 2 см */
    
    th, td { vertical-align: middle; }
    input.required-qty-input {
      width: 90px !important;
      min-width: 0;
      font-size: 1.05em;
      padding: 3px 6px;
      text-align: center;
      display: block;
      margin: 0 auto;
    }
    button, .btn-copy, .btn-update-qty, .btn-supplier, .shorten-btn { font-size: 0.95em !important; padding: 2px 8px !important; min-width: 0 !important; }
    th {
      background: #f0f4fa;
      font-weight: 600;
      color: #222;
    }
    tr:nth-child(even) td {
      background: #f8fafc;
    }
    tr.main-row {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1.5px 8px rgba(80,120,255,0.04);
      transition: box-shadow 0.18s;
    }
    tr.main-row:hover {
      box-shadow: 0 4px 24px rgba(80,120,255,0.13);
      background: #e0e7ff;
    }
    .notfound-row {
      color: #ff2222;
      background: #fff7f7;
      font-weight: bold;
      font-size: 1.05em;
      font-family: inherit;
      border-radius: 8px;
    }
    .copy-toast {
      position: absolute;
      background: #222;
      color: #fff;
      padding: 4px 14px;
      border-radius: 6px;
      font-size: 1em;
      z-index: 9999;
      opacity: 0.95;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.13);
      transition: opacity 0.3s;
    }
    @media (max-width: 700px) {
      .container {
        width: 100vw;
        max-width: none;
        padding: 10px 0 18px 0;
      }
      table, th, td {
        font-size: 0.95em;
      }
      textarea, input[type="text"] {
        font-size: 1em;
      }
      .table-wrapper {
        margin-top: 12px;
        width: 100vw;
      }
      /* Адаптивность для полей ввода */
      #bulk-search-form .flex-container {
        flex-direction: column;
        gap: 16px;
      }
      #bulk-search-form .flex-container > div:last-child {
        flex: 1;
        margin-top: 0;
      }
      #bulk-search-form label {
        min-height: auto;
        line-height: 1.3;
      }
    }
    button.btn-update-qty, button.btn-supplier {
      font-size: 0.98em;
      padding: 4px 18px;
      min-width: 90px;
      min-height: 28px;
      border-radius: 7px;
      margin: 2px 0;
      box-shadow: 0 1px 4px rgba(79,140,255,0.07);
    }
    button.btn-update-qty { background: #4f8cff; }
    button.btn-supplier { background: #2563eb; }
    button.btn-update-qty:hover { background: #2563eb; }
    button.btn-supplier:hover { background: #4f8cff; }
    .shorten-btn {
      font-size: 0.92em;
      padding: 2px 10px;
      margin-bottom: 2px;
      border-radius: 6px;
      background: #e0e7ff;
      color: #6366f1;
      border: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .shorten-btn:hover {
      background: #6366f1;
      color: #fff;
    }
    .align-right {
      text-align: right !important;
      font-variant-numeric: tabular-nums;
    }
    .th-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    /* Стили для невидимого столбца с чекбоксами */
    table th.checkbox-column,
    table td.checkbox-column,
    th:first-child.checkbox-column,
    td:first-child.checkbox-column {
      width: 18px !important;
      min-width: 18px !important;
      max-width: 18px !important;
      padding: 0 !important;
      margin: 0 !important;
      border: none !important;
      background: #fff !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
      text-align: left !important;

    }
    .checkbox-column input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0 !important;
      padding: 0 !important;
      cursor: pointer;
      background: transparent !important;
      border: none !important;
      display: block !important;
      box-sizing: border-box !important;

    }
    /* --- ДОБАВЛЕНО: визуальные индикаторы сортировки --- */
    th.sortable {
      position: relative;
      user-select: none;
      cursor: pointer;
    }
    th.sortable::before {
      content: '↕';
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #9ca3af;
      opacity: 0.5;
      transition: all 0.2s ease;
    }
    th.sortable:hover::before {
      opacity: 1;
      color: #4f8cff;
    }
    th.sort-asc::before {
      content: '↑';
      color: #10b981;
      opacity: 1;
    }
    th.sort-desc::before {
      content: '↓';
      color: #ef4444;
      opacity: 1;
    }
    .controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      color: white;
      background: #3b82f6;
    }
    .controls button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      background: #2563eb;
    }
    .controls button:active {
      transform: translateY(0);
    }
    #supplier-updates {
      transition: opacity 0.3s;
    }
    #supplier-updates.fade {
      opacity: 0.3;
    }

    
    .th-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    th:nth-child(7), td:nth-child(7) { width: 159px !important; min-width: 159px !important; max-width: 159px !important; } /* Треб кол - 2 см */
    
    /* Стили для таблицы с чекбоксами (поиск по наименованию) */
    /* Когда есть чекбоксы, все столбцы сдвигаются на +1 позицию */
    th:nth-child(2).checkbox-column, td:nth-child(2).checkbox-column { width: 18px !important; min-width: 18px !important; max-width: 18px !important; } /* Чекбокс */
    th:nth-child(2):not(.checkbox-column), td:nth-child(2):not(.checkbox-column) { width: 400px !important; min-width: 400px !important; max-width: 400px !important; } /* Наименование */
    th:nth-child(3), td:nth-child(3) { width: 118px !important; min-width: 118px !important; max-width: 118px !important; } /* Бренд */
    th:nth-child(4), td:nth-child(4) { width: 173px !important; min-width: 173px !important; max-width: 173px !important; } /* Партномер */
    th:nth-child(5), td:nth-child(5) { width: 159px !important; min-width: 159px !important; max-width: 159px !important; } /* Цена (USD, ЦБ) */
    th:nth-child(6), td:nth-child(6) { width: 180px !important; min-width: 180px !important; max-width: 225px !important; } /* Наличие (шт) */
    th:nth-child(7), td:nth-child(7) { width: 151px !important; min-width: 151px !important; max-width: 151px !important; } /* Дистр */
    th:nth-child(8), td:nth-child(8) { width: 159px !important; min-width: 159px !important; max-width: 159px !important; } /* Треб кол */
    
    th, td { vertical-align: middle; }
  </style>
</head>
<body>
    <div class="container">
    <h2>Поиск товара по партномеру или названию</h2>
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <button id="toggle-supplier-updates" onclick="toggleSupplierUpdates()" style="padding: 4px 8px; font-size: 0.8em; background: #f3f4f6; color: #9ca3af; border: none; border-radius: 4px; cursor: pointer; opacity: 0.7;">
          🔽
        </button>
      </div>
    <ul id="supplier-updates" style="list-style: none; padding: 0; margin: 0;"></ul>
    <div id="cbr-rate-info" class="cbr-rate"></div>
    
          <!-- Два столбца: поиск по партномерам слева, поиск по наименованию справа -->
      <div style="display: flex; gap: 18px; margin-bottom: 16px;">
      <!-- Левый столбец: Поиск по партномерам -->
      <div style="flex: 1; background: #f8fafc; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0;">
        <h3 style="margin-top: 0; color: #374151;">📋 Поиск по списку партномеров</h3>
        <form id="bulk-search-form" method="post" action="/search">
          <div class="flex-container">
            <div>
              <label for="part_numbers">Парт-номера (вставьте столбец из Excel):</label>
              <textarea name="part_numbers" id="part_numbers" rows="10" cols="30" placeholder="PRIME H610I-PLUS D4-CSM
PRO H610M-C D4-CSM
PRIME H610M-R D4-SI"></textarea>
            </div>
            <div>
              <label for="quantities">Количество (вставьте столбец из Excel):</label>
              <textarea name="quantities" id="quantities" rows="10" cols="10" placeholder="2
1
5"></textarea>
            </div>
          </div>
          <div id="input-warning" style="color: #c00; font-size: 1.05em; margin: 6px 0 0 0; display: none;"></div>
          <button type="submit" style="min-width: 120px; height: 40px; margin-top: 12px;">🔍 Найти</button>
        </form>
      </div>
      
      <!-- Правый столбец: Поиск по наименованию -->
      <div style="flex: 1; background: #f8fafc; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0;">
        <h3 style="margin-top: 0; color: #374151;">🔍 Поиск по наименованию</h3>
        <div style="margin-bottom: 15px;">
          <label for="name-search-input">Поисковый запрос:</label><br>
            <textarea id="name-search-input" name="name-search-input" rows="10" cols="30" placeholder="Например: процессор core, материнская плата, монитор 24" style="margin-top: 24px;"></textarea>
        </div>
        
        <div style="margin-top: 12px;">
          <button type="button" onclick="performNameSearch()" style="min-width: 120px; height: 40px;">🔍 Найти</button>
          </div>
      </div>
    </div>
    <br>
    <div class="controls" style="margin-bottom: 10px; display: flex; gap: 10px; align-items: center;">
      <button id="show-full-btn" onclick="toggleShortName()">Показать полностью</button>
    </div>

    
    <!-- Единая таблица результатов -->
    <div id="table-container"></div>
  </div>

  <script>
    // ВОССТАНАВЛИВАЮ исходные headers, tailHeaders, noCopyHeaders
    const headers = [
      "Наименование", "Бренд", "Партномер", "Цена (USD, ЦБ)", "Наличие (шт)", "Дистр", "Треб кол"
    ];
    const tailHeaders = [
      "Цена (RUB)", "Цена (USD)", "Суммарное наличие", "Объем упаковки, м3", "Вес упаковки, кг", "Технические характеристики", "Дата транзита"
    ];
    const noCopyHeaders = [
      "Треб кол",
      "Объем упаковки, м3",
      "Вес упаковки, кг",
      "Технические характеристики",
      "Дата транзита"
    ];
    // --- Копирование столбца ---
    // --- Получение курса ЦБ РФ ---
    async function fetchCbrUsdRate() {
      try {
        const res = await fetch('/usd_rate?' + new Date().getTime());
        const data = await res.json();
        console.log('Курс через наш API:', data.rate, data.date);
        return {
          rate: data.rate,
          date: data.date
        };
      } catch (error) {
        console.error('Ошибка получения курса через наш API:', error);
        return { rate: null, date: '' };
      }
    }

    // Обновление курса при загрузке страницы
    async function updateCbrRate() {
      const cbr = await fetchCbrUsdRate();
      window._lastCbrRate = cbr;
      const rateInfo = cbr.rate ? `Курс ЦБ РФ: 1 USD = ${cbr.rate.toFixed(2)} RUB${cbr.date ? ' (' + cbr.date + ')' : ''}` : 'Курс ЦБ РФ: не удалось получить';
      const rateElement = document.getElementById('cbr-rate-info');
      if (rateElement) {
        rateElement.innerText = rateInfo;
        // Добавляем предупреждение если данные старые
        if (cbr.date && cbr.date.includes('дн. назад')) {
          rateElement.style.color = '#d97706';
          rateElement.title = 'Внимание: курс может быть неактуальным (выходные/праздники)';
        } else {
          rateElement.style.color = '';
          rateElement.title = '';
        }
      }
    }

    // Обновляем курс при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
      updateCbrRate();
      

    });


    // --- Копирование столбца с учётом USD ЦБ ---
    // Fallback для старых браузеров и если navigator.clipboard временно недоступен
    function fallbackCopyTextToClipboard(text, header) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        const btn = document.getElementById('copy-btn-' + header);
        if (btn) {
          const old = btn.innerText;
          btn.innerText = 'Скопировано!';
          btn.disabled = true;
          setTimeout(() => { btn.innerText = '⧉'; btn.disabled = false; }, 1000);
        }
      } catch (err) {
        alert('Не удалось скопировать текст автоматически. Скопируйте вручную.');
      }
      document.body.removeChild(textarea);
    }
    function renderGroupedTable(data) {
      let html = '<div class="table-wrapper"><table><tr>';
      // Заголовки с кнопками копирования
      headers.forEach(h => {
        html += `<th>${h}`;
        if (!noCopyHeaders.includes(h)) {
          html += ` <button id="copy-btn-${h}" onclick="copyColumn('${h}')" class="btn-copy">⧉</button>`;
        }
        html += `</th>`;
      });
      html += '<th></th>';
      tailHeaders.forEach(h => {
        html += `<th>${h}`;
        if (!noCopyHeaders.includes(h)) {
          html += ` <button id="copy-btn-${h}" onclick="copyColumn('${h}')" class="btn-copy">⧉</button>`;
        }
        html += `</th>`;
      });
      html += '</tr>';
      data.forEach((item, idx) => {
        if (!item.offers || item.offers.length === 0) return;
        let offerIdx = 0;
        html += `<tr id="row-${idx}">` +
          headers.map(h => `<td id="cell-${idx}-${h}">${item.offers[0][h] !== null && item.offers[0][h] !== undefined && item.offers[0][h] !== '' ? item.offers[0][h] : '-'}</td>`).join('') +
          `<td><button onclick="switchSupplier(${idx})" class="btn-supplier">Сменить поставщика (${item.offers.length})</button></td>` +
          tailHeaders.map(h => `<td id="cell-${idx}-${h}">${item.offers[0][h] !== null && item.offers[0][h] !== undefined && item.offers[0][h] !== '' ? item.offers[0][h] : '-'}</td>`).join('') +
          '</tr>';
      });
      html += '</table></div>';
      document.getElementById('table-container').innerHTML = html;
      window._groupedOffers = data;
      window._currentOfferIdx = Array(data.length).fill(0);
    }
    window.switchSupplier = function(rowIdx) {
      const offers = window._groupedOffers[rowIdx].offers;
      let idx = window._currentOfferIdx[rowIdx];
      idx = (idx + 1) % offers.length;
      window._currentOfferIdx[rowIdx] = idx;
      const offer = offers[idx];
      headers.forEach(h => {

      const parsedLines = partLines.map((part, idx) => {

      const rateElement = document.getElementById('cbr-rate-info');

          rateElement.title = '';
        }
      }
      // --- Двухшаговый поиск ---
      // 1. Поиск по part_number (точное совпадение)
      let res1 = await fetch(`/search/grouped?part_numbers=${encodeURIComponent(queryPartNumbers)}`);
      let data1 = await res1.json();
      
      const pnMap = {};
      data1.forEach(item => {
        if (item.part_number) {
          // Очищаем партномер от пробелов и приводим к нижнему регистру
          const cleanPartNumber = item.part_number.trim().toLowerCase();
          pnMap[cleanPartNumber] = item;
        }
      });
      // 2. Для не найденных строк — поиск по name (подстрока)
      const notFoundLines = parsedLines.map(x => x.part.trim()).filter(line => line && !pnMap[line.trim().toLowerCase()]);
      let nameResults = [];

      if (notFoundLines.length > 0) {

        nameResults.forEach(item => {
          if (item && item.name) {

          }
        });
      }
      // 3. Сопоставление результатов + сортировка офферов по USD один раз
      const tableData = parsedLines.map(({part, qty}) => {
        // Очищаем партномер от пробелов и приводим к нижнему регистру
        const key = part.trim().toLowerCase();
        if (/^\s*$/.test(part)) return { _empty: true };
        let item = null;
        if (pnMap[key]) item = pnMap[key];
        else {
          item = nameResults.find(i => i && i.name && i.name.toLowerCase().includes(key));
        }
        if (item && item.offers && item.offers.length > 0) {
          
          // Маппим поле "Дистрибьютор" в "Дистр" для совместимости с таблицей
          const mappedOffers = item.offers.map(offer => ({
            ...offer,
            "Дистр": offer["Дистрибьютор"] || offer["Дистр"] || "-"
          }));
          
          // Сортируем офферы: сначала с наличием > 0, потом с наличием = 0
          const sortedOffers = [...mappedOffers].sort((a, b) => {
            function getUsdCbr(off) {
              let usd = off["Цена (USD)"];
              let rub = off["Цена (RUB)"];
              let val = null;
              if (usd !== undefined && usd !== null && usd !== '' && usd !== '-') {
                val = parseFloat(usd.toString().replace(',', '.').replace(/[^0-9.\-]/g, ''));
              }
              if ((val === null || isNaN(val) || val === 0) && rub !== undefined && rub !== null && rub !== '' && rub !== '-' && window._lastCbrRate && window._lastCbrRate.rate) {
                let numRub = parseFloat(rub);
                if (!isNaN(numRub) && numRub > 0) {
                  val = numRub / window._lastCbrRate.rate;
                }
              }
              return (val !== null && !isNaN(val)) ? val : Infinity;
            }
            
            function getStockValue(off) {
              let stock = off["Наличие (шт)"];
              if (stock === undefined || stock === null || stock === '' || stock === '-') {
                return 0;
              }
              
              // Если это число
              if (typeof stock === 'number') {
                return stock;
              }
              
              // Если это строка, извлекаем цифры
              let stockStr = stock.toString().trim();
              let stockDigits = stockStr.replace(/[^0-9]/g, '');
              return stockDigits ? parseInt(stockDigits, 10) : 0;
            }
            
            // Получаем значения для сортировки
            let stockA = getStockValue(a);
            let stockB = getStockValue(b);
            let priceA = getUsdCbr(a);
            let priceB = getUsdCbr(b);
            
            // Сначала сортируем по наличию: товары с наличием > 0 идут первыми
            if (stockA > 0 && stockB === 0) return -1;  // A с наличием > 0, B с наличием = 0
            if (stockA === 0 && stockB > 0) return 1;   // A с наличием = 0, B с наличием > 0
            
            // Если оба с наличием > 0 или оба с наличием = 0, сортируем по цене
            if (stockA > 0 && stockB > 0) {
              // Оба с наличием > 0 - сортируем по возрастанию цены
              return priceA - priceB;
            } else if (stockA === 0 && stockB === 0) {
              // Оба с наличием = 0 - сортируем по возрастанию цены
              return priceA - priceB;
            }
            
            // Если один с наличием > 0, а другой с наличием = 0, то с наличием > 0 идет первым
            return stockB - stockA;
          });
          // Добавляем вычисление минимальной цены USD для глобальной сортировки
          let minUsd = Infinity;
          sortedOffers.forEach(off => {
            let usd = off["Цена (USD)"];

            let val = null;

            if ((val === null || isNaN(val) || val === 0) && rub !== undefined && rub !== null && rub !== '' && rub !== '-' && window._lastCbrRate && window._lastCbrRate.rate) {
              let numRub = parseFloat(rub);
              if (!isNaN(numRub) && numRub > 0) {
                val = numRub / window._lastCbrRate.rate;
              }
            }
            if (val !== null && !isNaN(val) && val < minUsd) minUsd = val;
          });
          return { ...item, sortedOffers, requiredQty: qty, minUsd };
        }
        if (item && (!item.offers || item.offers.length === 0)) {
          return { _notfound: part };
        }
        if (!item) {
          return { _notfound: part };
        }
        return item;
      });
      // --- Удаляем глобальную сортировку tableData ---
      // tableData.sort(...) // Удалено!
      // После формирования tableData просто сбрасываем window._currentOfferIdx
      window._currentOfferIdx = tableData.map(x => (x && x.sortedOffers && x.sortedOffers.length > 0 ? 0 : null));
      renderGroupedTableWithGaps(tableData, false);

    window.copyColumn = function(colIdx) {

      if (!table) return;
      
      let values = [];
      let tbody = table.querySelector('tbody');
      let trs;

        trs = Array.from(table.querySelectorAll('tr'));

    // --- Функция для преобразования значения наличия в число ---
    function parseStock(val) {
      if (!val) return 0;
      // Если это уже число, возвращаем его
      if (typeof val === 'number') {
        return Math.floor(val);
      }
      // Если это строка, парсим её
      if (typeof val === 'string') {
        val = val.trim().replace(',', '.');
        if (val.toLowerCase() === 'много') return 99;
        if (val.includes('+')) {
          let n = parseFloat(val.split('+')[0]);
          return isNaN(n) ? 0 : Math.floor(n);
        }
        if (val.includes('>')) {
          let n = parseFloat(val.replace('>', ''));
          n = isNaN(n) ? 0 : Math.floor(n + 1);
          return n;
        }
        if (val.includes('<')) {
          let n = parseFloat(val.replace('<', ''));
          n = isNaN(n) ? 0 : Math.floor(n - 1);
          return n;
        }
        let n = parseFloat(val);
        n = isNaN(n) ? 0 : Math.floor(n);
        return n;
      }
      return 0;
    }

    // --- Функция для преобразования наличия Treolan ---
    function parseStockTreolan(val) {
      if (val === undefined || val === null) return 0;
      if (typeof val === 'number') return Math.floor(val);
      val = val.toString().trim().replace(',', '.');
      if (val.toLowerCase() === 'много') return 99;
      if (val === '' || val === '0') return 0;
      if (val.includes('+')) {
        let n = parseFloat(val.split('+')[0]);
        return isNaN(n) ? 0 : Math.floor(n);
      }
      if (val.includes('>')) {
        let n = parseFloat(val.replace('>', ''));
        n = isNaN(n) ? 0 : Math.floor(n + 1);
        return n;
      }
      if (val.includes('<')) {
        let n = parseFloat(val.replace('<', ''));
        n = isNaN(n) ? 0 : Math.floor(n - 1);
        return n;
      }
      let n = parseFloat(val);
      if (isNaN(n)) return 0;
      n = Math.floor(n);
      return n;
    }

    // --- Функция для визуального форматирования чисел с пробелами и запятыми ---
    function formatNumberVisual(num, isStock) {
      // isStock: true для "Наличие (шт)", тогда без десятичных
      if (typeof num === 'number' && !isNaN(num)) {
        if (isStock) {
          return num.toLocaleString('ru-RU', {maximumFractionDigits: 0}).replace(/\u00A0/g, ' ');
        } else {
          return num.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2}).replace(/\u00A0/g, ' ');
        }
      }
      if (typeof num === 'string' && /^\d+(\.\d+)?$/.test(num)) {
        let n = Number(num);
        if (isStock) {
          return n.toLocaleString('ru-RU', {maximumFractionDigits: 0}).replace(/\u00A0/g, ' ');
        } else {
          return n.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2}).replace(/\u00A0/g, ' ');
        }
      }
      return num;
    }

          let planTableRowsDP = '';
          let planDP = [];
          let totalPriceDP = 0;
          let totalQtyDP = 0;
          // --- Оптимальный план закупки (bounded knapsack) ---
          offersForDP = item.sortedOffers.map(off => {
            let stockRaw = off["Наличие (шт)"];
            let parsedStock = (off["Дистр"] || '').toLowerCase() === 'treolan'
              ? parseStockTreolan(stockRaw)
              : parseStock(stockRaw);
            let stockNum = Number(stockRaw);
            let stock = Math.max(0, isNaN(stockNum) ? parsedStock : Math.min(parsedStock, stockNum));
            let price = getOfferUsdCbr(off);
            // Логируем попадание в DP
            if (stock > 0 && isFinite(price)) {
              console.log(`[DP] Включён: ${off["Дистр"]}, stock: ${stock}, price: ${price}`);
            } else {
                              console.log(`[DP] Пропущен: ${off["Дистр"]}, stock: ${stock}, price: ${price}`);
            }
            return {
                              distributor: off["Дистр"],
              price: price === null ? Infinity : price,
              stock: stock,
              offerObj: off
            };
          }).filter(x => x.stock > 0 && isFinite(x.price));
          // DP: нельзя брать больше, чем stock у каждого дистрибьютора
          let dp = Array(requiredQty + 1).fill(Infinity);
          let from = Array(requiredQty + 1).fill(null);
          dp[0] = 0;
          for (let i = 0; i < offersForDP.length; ++i) {
            for (let q = requiredQty; q >= 0; --q) {
              for (let take = 1; take <= offersForDP[i].stock && q + take <= requiredQty; ++take) {
                if (dp[q] < Infinity) {
                  let newCost = dp[q] + take * offersForDP[i].price;
                  if (newCost < dp[q + take]) {
                    dp[q + take] = newCost;
                    from[q + take] = {prev: q, offerIdx: i, take};
                  }
                }
              }
            }
          }
          // Если DP не смог набрать нужное количество, собираем максимум возможного по stock
          planDP = [];
          totalPriceDP = dp[requiredQty];
          totalQtyDP = 0;
          if (isFinite(totalPriceDP)) {
            // Восстанавливаем план закупки
            let used = Array(offersForDP.length).fill(0);
            let q = requiredQty;
            while (q > 0 && from[q]) {
              let {prev, offerIdx, take} = from[q];
              used[offerIdx] += take;
              q = prev;
            }
            // Формируем строки для таблицы
            for (let i = 0; i < offersForDP.length; ++i) {
              if (used[i] > 0) {
                let qty = Math.min(used[i], offersForDP[i].stock);
                planDP.push({
                  distributor: offersForDP[i].distributor,
                  qty: qty,
                  price: offersForDP[i].price,
                  sum: qty * offersForDP[i].price
                });
                totalQtyDP += qty;
              }
            }

            let qtyLeft = requiredQty;
            for (let i = 0; i < offersForDP.length; ++i) {
              let take = Math.min(qtyLeft, offersForDP[i].stock);
              if (take > 0) {
                planDP.push({
                  distributor: offersForDP[i].distributor,
                  qty: take,
                  price: offersForDP[i].price,
                  sum: take * offersForDP[i].price
                });
                totalQtyDP += take;
                qtyLeft -= take;
              }
              if (qtyLeft <= 0) break;
            }
            totalPriceDP = planDP.reduce((acc, row) => acc + row.sum, 0);
          }
          planTableRowsDP = '';

    function updateProcurementPlan(idx) {

    // Функция сортировки таблицы по клику на заголовок
    window.sortTableByColumn = function(columnName, direction) {
      
      const data = window._lastTableDataWithGaps || [];
      if (!data || data.length === 0) return;
      
      let isAscending;
      if (direction === 'asc') isAscending = true;
      else if (direction === 'desc') isAscending = false;
      else {
        const currentSort = window._currentSort || {};
        isAscending = currentSort.column === columnName ? !currentSort.ascending : true;
      }
      
      // Добавляем небольшую задержку для предотвращения случайных двойных кликов
      if (window._sortTimeout) {
        clearTimeout(window._sortTimeout);
      }
      
      window._sortTimeout = setTimeout(() => {
        performSort(data, columnName, isAscending);
      }, 100);
    }

    function performSort(data, columnName, isAscending) {
      data.sort((a, b) => {
        if (a._empty || a._notfound) return 1;
        if (b._empty || b._notfound) return -1;
        
        let aVal, bVal;
        
        // ... existing code ...
        if (columnName === "Наименование") {
          aVal = a.name || "";
          bVal = b.name || "";
        } else if (columnName === "Бренд") {
          aVal = a.brand || "";
          bVal = b.brand || "";
        } else if (columnName === "Партномер") {

          bVal = b.part_number || "";
        } else if (columnName === "Цена (USD, ЦБ)") {

            if (!item.sortedOffers || item.sortedOffers.length === 0) return 0;
            const offer = item.sortedOffers[0];
            let usd = offer["Цена (USD)"];
            let rub = offer["Цена (RUB)"];
            let val = 0;
            if (usd !== undefined && usd !== null && usd !== '' && usd !== '-') {
              val = parseFloat(usd) || 0;
            } else if (rub !== undefined && rub !== null && rub !== '' && rub !== '-' && window._lastCbrRate && window._lastCbrRate.rate) {
              let numRub = parseFloat(rub);
              if (!isNaN(numRub) && numRub > 0) {
                val = numRub / window._lastCbrRate.rate;
              }
            }
            return val;
          }
          aVal = getUsdCbrValue(a);
          bVal = getUsdCbrValue(b);
        } else if (columnName === "Цена (RUB)") {

          bVal = b.sortedOffers && b.sortedOffers.length > 0 ? parseFloat(b.sortedOffers[0]["Цена (RUB)"]) || 0 : 0;
        } else if (columnName === "Цена (USD)") {

          return isAscending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        } else {
          return isAscending ? aVal - bVal : bVal - aVal;
        }
      });
      
      window._currentSort = { column: columnName, ascending: isAscending };
      

      renderGroupedTableWithGaps(data, window._isCheckboxesVisible);
      
      // Обновляем стили заголовков
      const headers = document.querySelectorAll('th');
      headers.forEach(header => {
        header.style.background = '#f0f4fa';
        if (header.textContent.includes(columnName)) {
          header.style.background = isAscending ? '#e0e7ff' : '#dbeafe';
          header.title = `Сортировка: ${columnName} (${isAscending ? 'по возрастанию' : 'по убыванию'})`;
        }
      });
    }

    window.togglePartInSearch = function(checkbox) {
      const partNumber = checkbox.getAttribute('data-part');
      const textarea = document.getElementById('part_numbers');
      if (!textarea) return;
      let lines = textarea.value.split('\n').map(x => x.trim()).filter(x => x);
      if (checkbox.checked) {
        if (!lines.includes(partNumber)) lines.push(partNumber);
      } else {
        lines = lines.filter(x => x !== partNumber);
      }
      textarea.value = lines.join('\n');
    };


    



    


    // --- Функция для нормализации похожих букв (A=А, K=К, O=О, E=Е, C=С, H=Н, B=В, Р=P, T=Т, Х=X, М=M) ---
    function normalizeSimilarLetters(str) {
      if (!str) return '';
      return str
        .replace(/A/g, 'А').replace(/a/g, 'а')
        .replace(/K/g, 'К').replace(/k/g, 'к')
        .replace(/O/g, 'О').replace(/o/g, 'о')
        .replace(/E/g, 'Е').replace(/e/g, 'е')
        .replace(/C/g, 'С').replace(/c/g, 'с')
        .replace(/H/g, 'Н').replace(/h/g, 'н')
        .replace(/B/g, 'В').replace(/b/g, 'в')
        .replace(/P/g, 'Р').replace(/p/g, 'р')
        .replace(/T/g, 'Т').replace(/t/g, 'т')
        .replace(/X/g, 'Х').replace(/x/g, 'х')
        .replace(/M/g, 'М').replace(/m/g, 'м');
    }

  </script>
